<div class="blotter-header">
    <h5 class="blotter-title">
        <i class="fas fa-list-alt me-2"></i>Trade History
    </h5>
    <div class="blotter-stats">
        <span class="stat-item">
            <i class="fas fa-chart-bar me-1"></i>
            {{ (trades && trades.length) || 0 }} trades
        </span>
    </div>
</div>

<div class="blotter-content">
    <ag-grid-angular 
        style="width: 100%; height: 350px;" 
        class="ag-theme-alpine modern-grid" 
        [columnDefs]="columnDefs"
        [rowData]="trades" 
        (gridReady)="onGridReady($event)" 
        [getRowId]="getRowId">
    </ag-grid-angular>
</div>
