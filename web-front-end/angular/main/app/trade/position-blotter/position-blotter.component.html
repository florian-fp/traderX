<div class="blotter-header">
    <h5 class="blotter-title">
        <i class="fas fa-chart-pie me-2"></i>Current Positions
    </h5>
    <div class="blotter-stats">
        <span class="stat-item">
            <i class="fas fa-briefcase me-1"></i>
            {{ positions?.length || 0 }} positions
        </span>
    </div>
</div>

<div class="blotter-content">
    <ag-grid-angular 
        #agGrid 
        style="width: 100%; height: 350px;" 
        id="myGrid" 
        class="ag-theme-alpine modern-grid"
        [columnDefs]="columnDefs" 
        [rowData]="positions" 
        (gridReady)="onGridReady($event)" 
        [getRowId]="getRowId">
    </ag-grid-angular>
</div>
