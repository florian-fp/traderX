<div class="trade-ticket-modal">
    <div class="modal-header">
        <h4 class="modal-title">
            <i class="fas fa-ticket-alt me-2"></i>Create Trade Ticket
        </h4>
    </div>
    
    <div class="modal-body">
        <form class="trade-form">
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user me-2"></i>Account
                </label>
                <input 
                    readonly 
                    disabled 
                    class="form-control" 
                    id="accountLabel" 
                    [value]="account?.displayName" 
                />
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-search me-2"></i>Security
                </label>
                <input
                    id="stock-input"
                    [minLength]="1"
                    [(ngModel)]="selectedCompany"
                    [typeahead]="filteredStocks"
                    typeaheadOptionField="companyName"
                    (typeaheadOnSelect)="onSelect($event)"
                    (blur)="onBlur()"
                    placeholder="Search for a security (e.g., AAPL, MSFT)"
                    class="form-control"
                    name="security"
                />
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-exchange-alt me-2"></i>Trade Side
                </label>
                <div class="side-selector">
                    <input
                        type="radio"
                        class="btn-check"
                        name="sideButton"
                        value="Buy"
                        id="buyButton"
                        [(ngModel)]="ticket.side"
                        checked
                        #buyButton
                    />
                    <label class="btn side-btn buy-btn" [class.active]="buyButton.checked" for="buyButton">
                        <i class="fas fa-arrow-up me-2"></i>Buy
                    </label>

                    <input
                        type="radio"
                        class="btn-check"
                        name="sideButton"
                        value="Sell"
                        id="sellButton"
                        [(ngModel)]="ticket.side"
                        #sellButton
                    />
                    <label class="btn side-btn sell-btn" [class.active]="sellButton.checked" for="sellButton">
                        <i class="fas fa-arrow-down me-2"></i>Sell
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-hashtag me-2"></i>Quantity
                </label>
                <input 
                    class="form-control" 
                    id="quantityField" 
                    type="number" 
                    [(ngModel)]="ticket.quantity"
                    placeholder="Enter number of shares"
                    min="1"
                    name="quantity"
                />
            </div>
        </form>
    </div>

    <div class="modal-footer">
        <button class="btn btn-primary" id="createButton" (click)="onCreate()">
            <i class="fas fa-check me-2"></i>Create Trade
        </button>
        <button class="btn btn-secondary" id="cancelButton" (click)="onCancel()">
            <i class="fas fa-times me-2"></i>Cancel
        </button>
    </div>
</div>
